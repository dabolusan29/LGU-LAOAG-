<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGU Laoag - Admin Authentication</title>
    
    <!-- Bootstrap 5 CSS Framework Styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        #error-banner {
            display: none;
        }
    </style>
</head>
<body>

    <div class="card login-card rounded-3">
        <div class="card-header bg-danger text-white text-center py-3">
            <h5 class="fw-bold mb-0">🔒 ADMINISTRATIVE ACCESS</h5>
            <small class="text-white-50">LGU Laoag — Office of City Engineering</small>
        </div>
        <div class="card-body p-4">
            
            <!-- Dynamic Error Feedback Banner -->
            <div id="error-banner" class="alert alert-danger text-center fw-bold small p-2 mb-3" role="alert">
                ❌ Invalid Username or Passcode PIN.
            </div>

            <form id="admin-login-form">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-bold text-muted">Admin Username</label>
                    <input type="text" class="form-control form-control-lg text-center font-monospace" id="username" placeholder="Enter Username" required autocomplete="off">
                </div>
                
                <div class="mb-4">
                    <label for="passcode" class="form-label small fw-bold text-muted">Passcode PIN</label>
                    <input type="password" class="form-control form-control-lg text-center" id="passcode" placeholder="••••••••" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger btn-lg fw-bold py-2 fs-6">Authenticate & Enter</button>
                    <a href="index.html" class="btn btn-outline-secondary btn-sm fw-bold border-0 mt-1">← Return to Terminal Kiosk</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passcodeInput = document.getElementById('passcode').value.trim();
            const errorBanner = document.getElementById('error-banner');

            // Explicit hardcoded credential verification matching requirements
            if (usernameInput === 'admin_engr' && passcodeInput === '12345678') {
                errorBanner.style.display = 'none';
                
                // Set a temporary session authorization key valid for the browser tab lifecycle
                sessionStorage.setItem('admin_authenticated', 'true');
                
                // Redirect to the master dashboard workspace
                window.location.href = 'admin.html';
            } else {
                // Clear out password space and flash failure banner
                document.getElementById('passcode').value = '';
                errorBanner.style.display = 'block';
            }
        });
    </script>
</body>
</html>
