<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGU Laoag - Admin Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .login-card {
            width: 100%; max-width: 420px; border: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="card login-card p-4">
        <div class="text-center py-3 border-bottom mb-4">
            <span class="fs-2">🔒</span>
            <h5 class="fw-black text-dark mb-1" style="font-weight: 800; letter-spacing: -0.5px;">ADMIN REGISTRY GATEWAY</h5>
            <small class="text-muted fw-semibold text-uppercase tracking-wider" style="font-size:0.7rem;">LGU Laoag City Infrastructure Control</small>
        </div>
        
        <div id="error-banner" class="alert alert-danger text-center fw-bold small p-2 mb-3" style="display: none;" role="alert">
            ❌ Access Denied: Mismatched Parameter PIN.
        </div>

        <form id="admin-login-form">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold text-secondary">Control Identifier Unit</label>
                <input type="text" class="form-control form-control-lg text-center font-monospace" id="username" placeholder="admin_engr" required autocomplete="off" style="font-size: 1rem;">
            </div>
            
            <div class="mb-4">
                <label for="passcode" class="form-label small fw-bold text-secondary">Passcode Authorization PIN</label>
                <input type="password" class="form-control form-control-lg text-center" id="passcode" placeholder="••••••••" required style="font-size: 1rem;">
            </div>
            
            <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold py-2.5 rounded-3 fs-6 mb-2">Initialize Authentication Node</button>
            <a href="index.html" class="btn btn-link btn-sm w-100 text-secondary text-decoration-none fw-semibold">← Decline & Fallback to Kiosk Station</a>
        </form>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passcodeInput = document.getElementById('passcode').value.trim();
            const errorBanner = document.getElementById('error-banner');

            if (usernameInput === 'admin_engr' && passcodeInput === '12345678') {
                errorBanner.style.display = 'none';
                sessionStorage.setItem('admin_authenticated', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('passcode').value = '';
                errorBanner.style.display = 'block';
            }
        });
    </script>
</body>
</html>
